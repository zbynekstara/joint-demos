<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Do you want users to be able to upload an image directly into the stencil and view it in LightBox? Check out this demo.">
    <title>JointJS+: Upload Image to Stencil</title>
</head>

<body id="app">
    <input type="file" id="add-image-input" accept="image/*" hidden />
    <label id="add-image-button" for="add-image-input">Add image(s)</label>
    <div id="stencil-container">
    </div>
    <div id="paper-container"></div>
    <a target="_blank" href="https://www.jointjs.com">
        <img id="logo" src="./assets/jointjs-logo-black.svg" width="200"
            height="50"></img>
    </a>
    <!-- Application files: -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
