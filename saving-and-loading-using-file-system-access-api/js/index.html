<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="See how to save and load diagrams using the File System Access API.">
    <title>JointJS: Saving and Loading Using File System Access API</title>
</head>

<body id="app">

    <div id="stencil-container"></div>
    <div id="paper-container"></div>
    <div id="toolbar-container">
        <div class="current-file-name-container">
            <span id="current-file-name"></span>
        </div>
    </div>

    <a target="_blank" href="https://www.jointjs.com">
        <img id="logo" src="./assets/jointjs-logo-red.svg" width="200" height="50"></img>
    </a>

    <!--File input for loading the diagram-->
    <input type="file" id="diagramload" style="display:none" accept=".joint" />

    <!-- Application files: -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
