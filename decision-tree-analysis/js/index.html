<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Check out this demo, which shows how to use the layout.TreeLayout plugin to build a decision tree analysis.">
    <title>JointJS+: Decision Tree Analysis</title>
</head>

<body id="app" class="app">
    <div id="paper"></div>
    <fieldset id="results">
        <legend>Results</legend>

        <div>
            <input type="checkbox" id="wins" name="Winner" checked>
            <label for="wins">Wins</label>
        </div>

        <div>
            <input type="checkbox" id="losses" name="Loser">
            <label for="losses">Losses</label>
        </div>

        <div>
            <input type="checkbox" id="draws" name="Draw">
            <label for="draws">Draws</label>
    </fieldset>

    <a target="_blank" href="https://www.jointjs.com">
        <img id="logo" src="./assets/jointjs-logo-white.svg" width="200" height="50"></img>
    </a>
    <!-- Application files: -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
